name: Build LaTeX documents

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compile public thesis templates
        uses: xu-cheng/latex-action@v3
        with:
          root_file: thesis_eng.tex, thesis_ger.tex

      - name: Upload thesis PDFs
        uses: actions/upload-artifact@v4
        with:
          name: thesis-pdfs
          path: |
            thesis_eng.pdf
            thesis_ger.pdf

      - name: Create Overleaf ZIP
        run: |
          chmod +x ./scripts/make_overleaf_zip.sh
          ./scripts/make_overleaf_zip.sh

      - name: Upload Overleaf ZIP
        uses: actions/upload-artifact@v4
        with:
          name: overleaf-zip
          path: overleaf.zip