name: Publish release assets

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag_name:
        description: Release tag to publish assets for (existing assets are not overwritten)
        required: true
        type: string

permissions:
  contents: write

jobs:
  release-assets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag_name || github.ref }}

      - name: Compile public thesis templates
        uses: xu-cheng/latex-action@v4
        with:
          root_file: |
            thesis_eng.tex
            thesis_ger.tex

      - name: Create Thesis Template ZIP
        run: |
          chmod +x ./scripts/make_overleaf_zip.sh
          ./scripts/make_overleaf_zip.sh

      - name: Verify Thesis Template ZIP contents
        run: |
          bash ./scripts/verify_overleaf_zip.sh

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-assets
          path: |
            thesis_eng.pdf
            thesis_ger.pdf
            thesis_template.zip

      - name: Attach assets to GitHub release
        if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event.release.tag_name || inputs.tag_name }}
          files: |
            thesis_eng.pdf
            thesis_ger.pdf
            thesis_template.zip
          overwrite_files: false